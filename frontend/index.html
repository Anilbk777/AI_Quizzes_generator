<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Quiz Generator</title>
    <link href="https://cdn.jsdelivr.net/npm/remixicon@4.9.0/fonts/remixicon.css" rel="stylesheet" />

    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="main">
        <div id="header">
            <h2>
                AI Quiz Generator
            </h2>
            <p>
                Create quizzes instantly with our AI-powered generator. Turn any topic, YouTube video, or file into structured
                multiple-choice questions in seconds.
            </p>
        </div>
        <div id="buttons">
            <button>
                <i class="ri-t-box-line"></i>Text
            </button>
            <button>
                <i class="ri-file-text-line"></i>File
            </button>
            <button>
                <i class="ri-youtube-fill"></i>YouTube
            </button>
        </div>
        <div id="text">
            <textarea name="text-area">Type your topic here to get your quiz.</textarea>
        </div>

    </div>
    
</body>
</html>
